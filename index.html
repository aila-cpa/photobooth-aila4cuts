<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aila4cuts | Photo Booth</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --pica-red: #8B0000;
            --soft-pink: #ffceda;
            --deep-pink: #d17a8e;
            --white: #ffffff;
            /* San Francisco / Apple System Font Stack */
            --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #fdfefe;
            font-family: var(--apple-font);
            -webkit-font-smoothing: antialiased;
            color: #1d1d1f;
        }

        .container { text-align: center; width: 100%; max-width: 1100px; padding: 20px; }
        
        .brand-title {
            font-size: 42px;
            font-weight: 700;
            color: var(--deep-pink);
            letter-spacing: -1.2px;
            margin-bottom: 30px;
        }

        /* Page Transitions */
        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Studio Layout */
        .booth-layout {
            display: flex;
            justify-content: center;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .video-box {
            position: relative;
            width: 640px;
            height: 480px;
            background: #000;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 8px solid var(--white);
        }

        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: filter 0.3s; }

        .countdown {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 160px;
            color: white;
            font-weight: 700;
            z-index: 10;
            display: none;
            text-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        /* Photo Strip Preview */
        .strip-preview {
            position: relative;
            width: 240px;
            background: var(--pica-red);
            padding: 35px 14px 25px 14px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 2px;
        }

        .image-strip { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .image-strip img { width: 100%; height: 160px; object-fit: cover; background: #222; }

        .watermark {
            margin-top: 15px;
            color: var(--soft-pink);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* UI Elements */
        .controls-bar {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .filter-pill {
            background: rgba(0,0,0,0.04);
            padding: 8px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        select {
            padding: 8px 12px;
            border: none;
            background: transparent;
            font-family: var(--apple-font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        button {
            padding: 16px 45px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: 0.2s;
            font-family: var(--apple-font);
        }

        .btn-capture { background: var(--deep-pink); color: white; }
        .btn-capture:hover { transform: scale(1.02); opacity: 0.9; }
        .btn-next { background: #0071e3; color: white; display: none; }

        /* Customization Page */
        .edit-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            text-align: left;
        }

        .setting-card { background: white; padding: 25px; border-radius: 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .setting-card h3 { margin-top: 0; font-size: 18px; margin-bottom: 20px; }

        .btn-action { background: #f5f5f7; color: #1d1d1f; width: 100%; margin-bottom: 10px; }
        .btn-action:hover { background: var(--soft-pink); }
        
        #qrcode { margin-top: 20px; background: white; padding: 10px; display: inline-block; border-radius: 12px; }
    </style>
</head>
