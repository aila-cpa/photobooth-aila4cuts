<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aila4cuts | Photo Booth</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --pica-red: #8B0000;
            --soft-pink: #ffceda;
            --deep-pink: #d17a8e;
            --white: #ffffff;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #fdf9f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .container { text-align: center; width: 100%; max-width: 1200px; padding: 20px; }
        
        .brand-title {
            font-size: 42px;
            font-weight: 900;
            color: var(--deep-pink);
            letter-spacing: -1px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0px var(--soft-pink);
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .booth-layout {
            display: flex;
            justify-content: center;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .video-box {
            position: relative;
            width: 720px;
            height: 540px;
            background: #000;
            border: 10px solid var(--white);
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .countdown-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 180px;
            color: white;
            font-weight: bold;
            z-index: 10;
            display: none;
        }

        .strip-preview {
            position: relative;
            width: 250px;
            background: var(--pica-red);
            padding: 40px 15px 20px 15px; /* Adjusted bottom padding */
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-strip { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .image-strip img { width: 100%; height: 165px; object-fit: cover; background: #222; }

        .watermark {
            margin-top: 15px;
            color: var(--soft-pink);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .customize-grid {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 30px;
            align-items: start;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: left;
        }

        button {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            margin: 8px 0;
            width: 100%;
        }

        .btn-capture { background: var(--deep-pink); color: white; width: auto; padding: 15px 60px; font-size: 20px; }
        .btn-next { background: #4CAF50; color: white; display: none; width: auto; padding: 15px 50px; }
        .btn-dl { background: var(--soft-pink); color: var(--deep-pink); }

        input[type="color"], select, input[type="file"] {
            width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd;
