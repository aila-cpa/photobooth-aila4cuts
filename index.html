<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>aila4cuts | Photobooth</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

:root{
--pica-red:#8B0000;
--soft-pink:#ffceda;
--deep-pink:#d17a8e;
}

body{

margin:0;
background:#fdf9f9;

font-family:
-apple-system,
BlinkMacSystemFont,
"SF Pro Display",
"SF Pro Text",
Helvetica,
Arial,
sans-serif;

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

}

.container{
width:100%;
max-width:1200px;
text-align:center;
padding:20px;
}

.brand{
font-size:42px;
font-weight:900;
color:var(--deep-pink);
margin-bottom:20px;
}

.page{display:none;}
.page.active{display:block;}

.fullscreen-btn{
position:fixed;
top:15px;
right:15px;
padding:10px 18px;
background:black;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
z-index:999;
}

.booth{
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
}

.video-box{
position:relative;
width:640px;
aspect-ratio:4/3;
background:black;
border:10px solid white;
overflow:hidden;
}

#video{
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

.countdown{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
color:white;
font-weight:900;
display:none;
}

.strip-preview{
width:220px;
background:var(--pica-red);
padding:35px 12px 15px;
}

.strip-preview img{
width:100%;
height:150px;
object-fit:cover;
margin-bottom:8px;
background:#333;
}

.controls{
margin-top:20px;
}

button{

padding:14px 30px;
border-radius:50px;
border:none;
cursor:pointer;
font-weight:bold;
margin:5px;

}

.capture{background:var(--deep-pink);color:white;}
.next{background:#4CAF50;color:white;display:none;}

.panel{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:20px;

}

.card{
background:white;
padding:20px;
border-radius:15px;
}

#qrcode{
margin-top:15px;
display:inline-block;
background:white;
padding:5px;
}

</style>
</head>

<body>

<button class="fullscreen-btn" id="fullscreenBtn">FULL VIEW</button>

<div class="container">

<div class="brand">aila4cuts</div>

<!-- CAMERA PAGE -->

<div id="cameraPage" class="page active">

<select id="filterSelect">

<option value="none">Normal</option>
<option value="grayscale(1)">B&W</option>
<option value="brightness(1.2) contrast(1.1) saturate(1.2)">Bright</option>
<option value="sepia(.8)">Sepia</option>
<option value="contrast(1.1) saturate(.9) brightness(.9) sepia(.3)">Vintage</option>
<option value="brightness(1.15) contrast(1.05) saturate(1.1)">Soft Bright</option>

</select>

<div class="booth">

<div class="video-box">

<video id="video" autoplay playsinline></video>

<div id="countdown" class="countdown">3</div>

</div>

<div class="strip-preview" id="previewStrip">

<img>
<img>
<img>
<img>

</div>

</div>

<div class="controls">

<button id="captureBtn" class="capture">START CAPTURE</button>

<button id="nextBtn" class="next">PERSONALIZE</button>

</div>

</div>

<!-- CUSTOMIZE PAGE -->

<div id="customPage" class="page">

<div class="panel">

<div class="card">

<h3>Strip Style</h3>

<label>Strip Color</label>

<input type="color" id="stripColor" value="#8B0000">

<label>Upload Template Overlay</label>

<input type="file" id="layoutUpload" accept="image/png">

<button onclick="location.reload()">Retake Photos</button>

</div>

<div style="display:flex;justify-content:center">

<div class="strip-preview" id="finalStrip">

<div id="finalImages"></div>

<img id="overlayPreview"
style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none">

</div>

</div>

<div class="card">

<h3>Download</h3>

<button id="downloadStrip">Download Strip</button>

<div id="qrcode"></div>

<p style="font-size:11px">Scan to download</p>

</div>

</div>

</div>

</div>

<script>

const video=document.getElementById("video")
const captureBtn=document.getElementById("captureBtn")
const nextBtn=document.getElementById("nextBtn")
const countdown=document.getElementById("countdown")
const previewImgs=document.querySelectorAll("#previewStrip img")

let overlayImg=new Image()

/* CAMERA */

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({video:true})

video.srcObject=stream

}

startCamera()

/* FILTER */

document.getElementById("filterSelect").addEventListener("change",e=>{

video.style.filter=e.target.value

})

/* CAPTURE */

captureBtn.onclick=async()=>{

for(let i=0;i<4;i++){

countdown.style.display="block"

for(let c=3;c>0;c--){

countdown.innerText=c

await new Promise(r=>setTimeout(r,1000))

}

countdown.style.display="none"

const canvas=document.createElement("canvas")

canvas.width=1200
canvas.height=900

const ctx=canvas.getContext("2d")

ctx.filter=video.style.filter

ctx.translate(canvas.width,0)
ctx.scale(-1,1)

ctx.drawImage(video,0,0,canvas.width,canvas.height)

const data=canvas.toDataURL()

previewImgs[i].src=data

}

nextBtn.style.display="inline-block"

}

/* NEXT PAGE */

nextBtn.onclick=()=>{

document.getElementById("cameraPage").classList.remove("active")

document.getElementById("customPage").classList.add("active")

document.getElementById("finalImages").innerHTML=
document.getElementById("previewStrip").innerHTML

}

/* STRIP COLOR */

document.getElementById("stripColor").oninput=e=>{

document.querySelectorAll(".strip-preview").forEach(s=>{

s.style.background=e.target.value

})

}

/* OVERLAY UPLOAD */

document.getElementById("layoutUpload").addEventListener("change",function(e){

const reader=new FileReader()

reader.onload=function(event){

overlayImg.src=event.target.result

document.getElementById("overlayPreview").src=event.target.result
document.getElementById("overlayPreview").style.display="block"

}

reader.readAsDataURL(e.target.files[0])

})

/* DOWNLOAD STRIP */

document.getElementById("downloadStrip").onclick=()=>{

const canvas=document.createElement("canvas")

canvas.width=1000
canvas.height=3400

const ctx=canvas.getContext("2d")

ctx.fillStyle=document.getElementById("stripColor").value

ctx.fillRect(0,0,1000,3400)

/* HEADER SPACE */

const photos=document.querySelectorAll("#finalImages img")

const positions=[750,1450,2150,2850]

photos.forEach((img,i)=>{

ctx.drawImage(img,80,positions[i],840,600)

})

/* watermark */

ctx.fillStyle="#ffceda"
ctx.font="bold 36px Arial"
ctx.textAlign="center"

ctx.fillText("@aila4cuts",500,3350)

/* overlay */

if(overlayImg.src){

ctx.drawImage(overlayImg,0,0,1000,3400)

}

/* export */

const data=canvas.toDataURL()

const link=document.createElement("a")

link.download="aila4cuts_strip.png"
link.href=data

link.click()

/* QR */

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),{

text:data,
width:120,
height:120

})

}

/* FULLSCREEN */

document.getElementById("fullscreenBtn").onclick=()=>{

if(!document.fullscreenElement){

document.documentElement.requestFullscreen()

}else{

document.exitFullscreen()

}

}

</script>

</body>
</html>
