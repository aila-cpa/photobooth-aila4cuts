<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aila4cuts</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
background:#fdf9f9;
font-family:Arial,sans-serif;
}

.container{
text-align:center;
}

h1{
font-weight:bold;
margin-bottom:30px;
color:#ffceda;
}

.header-controls{
margin-bottom:20px;
}

.header-controls input,
.header-controls select{
padding:10px;
border-radius:10px;
border:2px solid #ffceda;
margin:5px;
font-size:16px;
}

.custom-controls{
margin-top:10px;
}

.layout{
display:flex;
justify-content:center;
align-items:center;
gap:80px;
}

.camera-title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
color:#ff9fb4;
}

.video-container{
width:500px;
height:400px;
border:2px solid #ffceda;
display:flex;
align-items:center;
justify-content:center;
background:white;
position:relative;
}

#video{
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

.image-strip{
display:flex;
flex-direction:column;
border:1px solid #ffceda;
padding:5px;
gap:5px;
background:#ffceda;
}

.image-strip img{
width:150px;
height:100px;
background:white;
border:1px solid #ffceda;
object-fit:cover;
}

.controls{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
}

button{
background:#ffceda;
border:none;
padding:10px 30px;
border-radius:30px;
cursor:pointer;
font-size:16px;
color:white;
}

button:hover{
background:#e89595;
}

.countdown{
position:absolute;
font-size:100px;
color:red;
display:none;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#qrcode{
margin-top:20px;
display:flex;
justify-content:center;
}

</style>

</head>

<body>

<div class="container">

<h1>PHOTO BOOTH</h1>

<div class="header-controls">

<input type="text" id="titleInput" value="RECOGNITION DAY">
<input type="text" id="dateInput" value="MARCH 25, 2026">
<input type="file" id="layoutUpload" accept="image/png">

<select id="filterSelect">
<option value="none">Normal</option>
<option value="grayscale(1)">Black & White</option>
<option value="sepia(1)">Sepia</option>
<option value="contrast(1.2) saturate(1.4)">Vintage</option>
<option value="hue-rotate(180deg)">Cool</option>
<option value="brightness(1.25) contrast(0.95) saturate(1.15) blur(1px)">Soft Dreamy</option>
</select>

<label>
<input type="checkbox" id="mirrorToggle" checked>
Mirror Camera
</label>

<div class="custom-controls">

<label>Border Color</label> <input type="color" id="borderColor" value="#ffceda">

<label>Border Size</label> <input type="range" id="borderSize" min="0" max="40" value="10">

</div>

</div>

<div class="layout">

<div>

<div class="camera-title">aila4cuts</div>

<div class="video-container">
<video id="video" autoplay></video>
<div id="countdown" class="countdown">3</div>
</div>

</div>

<div class="image-strip" id="image-strip">
<img>
<img>
<img>
<img>
</div>

</div>

<div class="controls">
<button id="start">Start</button>
<button id="download">Download Photo</button>
<button id="reset">Take Photos Again</button>
</div>

<div id="qrcode"></div>

</div>

<script>

const video=document.getElementById("video");
const startButton=document.getElementById("start");
const downloadButton=document.getElementById("download");
const resetButton=document.getElementById("reset");

const countdown=document.getElementById("countdown");
const imageStrip=document.getElementById("image-strip").getElementsByTagName("img");

const filterSelect=document.getElementById("filterSelect");
const mirrorToggle=document.getElementById("mirrorToggle");

const borderColor=document.getElementById("borderColor");
const borderSize=document.getElementById("borderSize");

let mirrorEnabled=true;
let layoutImage=new Image();

/* CAMERA */

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream;
})
.catch(err=>{
alert("Camera not available");
});

/* MIRROR */

mirrorToggle.addEventListener("change",function(){

mirrorEnabled=this.checked;

if(mirrorEnabled){
video.style.transform="scaleX(-1)";
}else{
video.style.transform="scaleX(1)";
}

});

/* FILTER */

filterSelect.addEventListener("change",function(){
video.style.filter=this.value;
});

/* LAYOUT */

document.getElementById("layoutUpload").addEventListener("change",function(e){

const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(event){
layoutImage.src=event.target.result;
}

reader.readAsDataURL(file);

});

/* COUNTDOWN */

function startCountdown(){

return new Promise(resolve=>{

countdown.style.display="block";

let count=3;
countdown.innerText=count;

const interval=setInterval(()=>{

count--;
countdown.innerText=count;

if(count===0){
clearInterval(interval);
countdown.style.display="none";
resolve();
}

},1000);

});

}

/* CAPTURE */

async function captureImages(){

for(let i=0;i<4;i++){

await startCountdown();

const canvas=document.createElement("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const ctx=canvas.getContext("2d");

ctx.filter=video.style.filter || "none";

if(mirrorEnabled){
ctx.translate(canvas.width,0);
ctx.scale(-1,1);
}

ctx.drawImage(video,0,0,canvas.width,canvas.height);

imageStrip[i].src=canvas.toDataURL("image/png");

}

}

/* DOWNLOAD PHOTO */

function downloadImages(){

if(!imageStrip[0].src){
alert("Please take photos first!");
return;
}

const title=document.getElementById("titleInput").value;
const date=document.getElementById("dateInput").value;

const border=parseInt(borderSize.value);

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

const imageWidth=imageStrip[0].naturalWidth;
const imageHeight=imageStrip[0].naturalHeight;

const headerHeight=120;

canvas.width=imageWidth+(border*2);
canvas.height=(imageHeight*4)+headerHeight+(border*2);

ctx.fillStyle=borderColor.value;
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ffffff";
ctx.fillRect(border,border,canvas.width-border*2,canvas.height-border*2);

ctx.fillStyle="#333";
ctx.textAlign="center";

ctx.font="bold 20px Arial";
ctx.fillText(date,canvas.width/2,40);

ctx.font="bold 40px Arial";
ctx.fillText(title,canvas.width/2,90);

for(let i=0;i<4;i++){

ctx.drawImage(
imageStrip[i],
border,
headerHeight+(i*imageHeight),
imageWidth,
imageHeight
);

}

if(layoutImage.complete && layoutImage.src){
ctx.drawImage(layoutImage,0,0,canvas.width,canvas.height);
}

const dataURL=canvas.toDataURL("image/png");

const a=document.createElement("a");
a.href=dataURL;
a.download="photo_strip.png";
a.click();

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:dataURL,
width:200,
height:200
});

}

/* RESET */

function resetPhotos(){

for(let i=0;i<4;i++){
imageStrip[i].src="";
}

document.getElementById("qrcode").innerHTML="";

}

/* EVENTS */

startButton.addEventListener("click",captureImages);
downloadButton.addEventListener("click",downloadImages);
resetButton.addEventListener("click",resetPhotos);

</script>

</body>
</html>
