<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aila4cuts | Photo Booth</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --pica-red: #8B0000;
            --soft-pink: #ffceda;
            --deep-pink: #d17a8e;
            --white: #ffffff;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #fdf9f9;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        .container { text-align: center; width: 100%; max-width: 1200px; padding: 20px; }
        
        .brand-title {
            font-size: clamp(32px, 5vw, 42px);
            font-weight: 900;
            color: var(--deep-pink);
            letter-spacing: -1.5px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0px var(--soft-pink);
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Camera Box */
        .booth-layout {
            display: flex;
            justify-content: center;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .video-box {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3;
            background: #000;
            border: 10px solid var(--white);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .countdown-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(100px, 20vw, 150px);
            color: white;
            font-weight: 900;
            z-index: 100;
            display: none;
            pointer-events: none;
        }

        /* The Strip */
        .strip-preview {
            position: relative;
            width: 220px;
            background: var(--pica-red);
            padding: 35px 12px 15px 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-strip { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .image-strip img { width: 100%; height: 150px; object-fit: cover; background: #333; }

        .watermark {
            margin-top: 15px;
            color: var(--soft-pink);
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Buttons & Controls */
        .controls { margin-top: 30px; }
        
        button {
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
            margin: 5px;
        }

        .btn-capture { background: var(--deep-pink); color: white; }
        .btn-next { background: #4CAF50; color: white; display: none; }
        .btn-dl { background: var(--soft-pink); color: var(--deep-pink); width: 100%; }

        .customize-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
            text-align: left;
        }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        input[type="color"], select, input[type="file"] {
            width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px;
        }

        #qrcode { margin-top: 15px; background: white; padding: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-title">aila4cuts</div>

    <div id="cameraPage" class="page active">
        <div class="booth-layout">
            <div class="video-box">
                <video id="video" autoplay playsinline></video>
                <div id="countdown" class="countdown-overlay">3</div>
            </div>
            
            <div class="strip-preview" id="previewContainer">
                <div class="image-strip" id="stripImages">
                    <img src=""><img src=""><img src=""><img src="">
                </div>
                <div class="watermark">@aila4cuts</div>
            </div>
        </div>

        <div class="controls">
            <button id="captureBtn" class="btn-capture">📸 START CAPTURE</button>
            <button id="nextBtn" class="btn-next">PERSONALIZE ➔</button>
        </div>
    </div>

    <div id="customizePage" class="page">
        <div class="customize-panel">
            <div class="card">
                <h3>Style Settings</h3>
                <label>Strip Color</label>
                <input type="color" id="stripColor" value="#8B0000">
                <label>Overlay PNG</label>
                <input type="file" id="layoutUpload" accept="image/png">
                <label>Filter</label>
                <select id="filterSelect">
                    <option value="none">Normal</option>
                    <option value="brightness(1.2) contrast(1.1) saturate(1.2)">Bright</option>
                    <option value="grayscale(1)">B&W</option>
                </select>
                <button onclick="location.reload()" style="background:#eee; width:100%;">↺ Retake All</button>
            </div>

            <div style="display: flex; justify-content: center;">
                <div class="strip-preview" id="finalStrip">
                    <div class="image-strip" id="finalImages"></div>
                    <div class="watermark">@aila4cuts</div>
                    <img id="overlayImg" src="" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10;">
                </div>
            </div>

            <div class="card" style="text-align: center;">
                <h3>Get Photos</h3>
                <button id="downloadStrip" class="btn-dl">Download Strip</button>
                <button id="downloadMotion" class="btn-dl" style="background:#e3f2fd; color:#1565c0; margin-top:10px;">Download Frames</button>
                <div id="qrcode"></div>
                <p style="font-size:11px; color:#888;">Scan to Share</p>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const captureBtn = document.getElementById('captureBtn');
    const nextBtn = document.getElementById('nextBtn');
    const countdownEl = document.getElementById('countdown');
    const stripImgs = document.querySelectorAll('#stripImages img');
    let capturedFrames = [];
    let customLayout = new Image();

    // Camera Setup
    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 1280, height: 720, facingMode: "user" } 
            });
            video.srcObject = stream;
        } catch (e) {
            alert("Please allow camera access to use aila4cuts!");
        }
    }
    init();

    // Capture Logic
    captureBtn.addEventListener('click', async () => {
        captureBtn.disabled = true;
        capturedFrames = [];
        
        for (let i = 0; i < 4; i++) {
            countdownEl.style.display = 'block';
            for (let c = 3; c > 0; c--) {
                countdownEl.innerText = c;
                await new Promise(r => setTimeout(r, 1000));
            }
            countdownEl.style.display = 'none';

            const canvas = document.createElement('canvas');
            canvas.width = 1200; canvas.height = 900;
            const ctx = canvas.getContext('2d');
            ctx.filter = video.style.filter || 'none';
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const data = canvas.toDataURL('image/png');
            stripImgs[i].src = data;
            capturedFrames.push(data);
        }
        
        captureBtn.innerText = "RETAKE";
        captureBtn.disabled = false;
        nextBtn.style.display = 'inline-block';
    });

    // Navigation
    nextBtn.addEventListener('click', () => {
        document.getElementById('cameraPage').classList.remove('active');
        document.getElementById('customizePage').classList.add('active');
        document.getElementById('finalImages').innerHTML = document.getElementById('stripImages').innerHTML;
        
        // QR Code to current URL
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), {
            text: window.location.href,
            width: 120, height: 120
        });
    });

    // Customization
    document.getElementById('stripColor').addEventListener('input', (e) => {
        document.querySelectorAll('.strip-preview').forEach(s => s.style.backgroundColor = e.target.value);
    });

    document.getElementById('filterSelect').addEventListener('change', (e) => {
        video.style.filter = e.target.value;
        document.querySelectorAll('.image-strip img').forEach(img => img.style.filter = e.target.value);
    });

    document.getElementById('layoutUpload').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const overlay = document.getElementById('overlayImg');
            overlay.src = event.target.result;
            overlay.style.display = 'block';
            customLayout.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // Download PNG Strip
    document.getElementById('downloadStrip').addEventListener('click', () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 3200;

        ctx.fillStyle = document.getElementById('stripColor').value;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const currentImgs = document.querySelectorAll('#finalImages img');
        currentImgs.forEach((img, i) => {
            ctx.filter = img.style.filter || 'none';
            ctx.drawImage(img, 80, 150 + (i * 720), 840, 630);
        });

        // Add Watermark
        ctx.filter = 'none';
        ctx.fillStyle = "#ffceda";
        ctx.font = "bold 35px Arial";
        ctx.textAlign = "center";
        ctx.fillText("@aila4cuts", canvas.width / 2, 3120);

        if (customLayout.src) ctx.drawImage(customLayout, 0, 0, canvas.width, canvas.height);

        const link = document.createElement('a');
        link.download = 'aila4cuts_strip.png';
        link.href = canvas.toDataURL();
        link.click();
    });

    // Download Motion Poster (All frames in one)
    document.getElementById('downloadMotion').addEventListener('click', () => {
        const c = document.createElement('canvas');
        const ctx = c.getContext('2d');
        c.width = 1600; c.height = 1200; // Large grid of all photos
        ctx.drawImage(stripImgs[0], 0, 0, 800, 600);
        ctx.drawImage(stripImgs[1], 800, 0, 800, 600);
        ctx.drawImage(stripImgs[2], 0, 600, 800, 600);
        ctx.drawImage(stripImgs[3], 800, 600, 800, 600);
        
        const link = document.createElement('a');
        link.download = 'aila4cuts_frames.png';
        link.href = c.toDataURL();
        link.click();
    });
</script>
</body>
</html>
