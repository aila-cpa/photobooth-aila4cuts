<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aila4cuts | Photo Booth</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

:root{
--pica-red:#8B0000;
--soft-pink:#ffceda;
--deep-pink:#d17a8e;
--white:#ffffff;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
background:#fdf9f9;

font-family:
-apple-system,
BlinkMacSystemFont,
"SF Pro Display",
"SF Pro Text",
"Helvetica Neue",
Helvetica,
Arial,
sans-serif;

overflow-x:hidden;
}

.container{
text-align:center;
width:100%;
max-width:1200px;
padding:20px;
}

.brand-title{
font-size:40px;
font-weight:900;
color:var(--deep-pink);
letter-spacing:-1px;
margin-bottom:20px;
text-shadow:2px 2px 0px var(--soft-pink);
}

.fullscreen-btn{
position:fixed;
top:15px;
right:15px;
background:black;
color:white;
border:none;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
z-index:999;
}

.page{display:none;}
.page.active{display:block;}

.booth-layout{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.video-box{
position:relative;
width:100%;
max-width:640px;
aspect-ratio:4/3;
background:black;
border:10px solid white;
border-radius:8px;
overflow:hidden;
}

#video{
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

.countdown-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
color:white;
font-weight:900;
display:none;
}

.strip-preview{
position:relative;
width:220px;
background:var(--pica-red);
padding:35px 12px 15px 12px;
display:flex;
flex-direction:column;
align-items:center;
}

.image-strip{
display:flex;
flex-direction:column;
gap:8px;
width:100%;
}

.image-strip img{
width:100%;
height:150px;
object-fit:cover;
background:#333;
}

.watermark{
margin-top:10px;
color:var(--soft-pink);
font-size:13px;
font-weight:bold;
}

.controls{margin-top:20px;}

button{
padding:15px 35px;
border-radius:50px;
border:none;
cursor:pointer;
font-weight:bold;
font-size:16px;
margin:5px;
}

.btn-capture{background:var(--deep-pink);color:white;}
.btn-next{background:#4CAF50;color:white;display:none;}
.btn-dl{background:var(--soft-pink);color:var(--deep-pink);width:100%;}

.filter-bar{
margin-bottom:15px;
}

.customize-panel{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
}

#qrcode{
margin-top:15px;
background:white;
padding:5px;
display:inline-block;
}

</style>
</head>

<body>

<button class="fullscreen-btn" id="fullscreenBtn">FULL VIEW</button>

<div class="container">

<div class="brand-title">aila4cuts</div>

<!-- CAMERA PAGE -->

<div id="cameraPage" class="page active">

<div class="filter-bar">
<select id="filterSelect">
<option value="none">Normal</option>
<option value="grayscale(1)">B&W</option>
<option value="brightness(1.2) contrast(1.1) saturate(1.2)">Bright</option>
<option value="sepia(0.8)">Sepia</option>
<option value="contrast(1.1) saturate(.9) brightness(.9) sepia(.3)">Vintage</option>
<option value="brightness(1.15) contrast(1.05) saturate(1.1)">Soft Bright</option>
</select>
</div>

<div class="booth-layout">

<div class="video-box">
<video id="video" autoplay playsinline></video>
<div id="countdown" class="countdown-overlay">3</div>
</div>

<div class="strip-preview">
<div class="image-strip" id="stripImages">
<img><img><img><img>
</div>
<div class="watermark">@aila4cuts</div>
</div>

</div>

<div class="controls">
<button id="captureBtn" class="btn-capture">📸 START CAPTURE</button>
<button id="nextBtn" class="btn-next">PERSONALIZE ➔</button>
</div>

</div>

<!-- CUSTOMIZE PAGE -->

<div id="customizePage" class="page">

<div class="customize-panel">

<div class="card">

<label>Strip Color</label>
<input type="color" id="stripColor" value="#8B0000">

<button onclick="location.reload()">↺ Retake All</button>

</div>

<div style="display:flex;justify-content:center">

<div class="strip-preview" id="finalStrip">

<div class="image-strip" id="finalImages"></div>

<div class="watermark">@aila4cuts</div>

</div>

</div>

<div class="card" style="text-align:center">

<h3>Get Photos</h3>

<button id="downloadStrip" class="btn-dl">Download Strip</button>

<div id="qrcode"></div>

<p style="font-size:11px">Scan to Download</p>

</div>

</div>

</div>

</div>

<script>

const video=document.getElementById("video")
const captureBtn=document.getElementById("captureBtn")
const nextBtn=document.getElementById("nextBtn")
const countdown=document.getElementById("countdown")
const stripImgs=document.querySelectorAll("#stripImages img")

let photostripData=null

/* CAMERA */

async function init(){
const stream=await navigator.mediaDevices.getUserMedia({video:true})
video.srcObject=stream
}
init()

/* FILTER */

document.getElementById("filterSelect").addEventListener("change",(e)=>{
video.style.filter=e.target.value
})

/* CAPTURE */

captureBtn.onclick=async()=>{

for(let i=0;i<4;i++){

countdown.style.display="block"

for(let c=3;c>0;c--){
countdown.innerText=c
await new Promise(r=>setTimeout(r,1000))
}

countdown.style.display="none"

const canvas=document.createElement("canvas")
canvas.width=1200
canvas.height=900

const ctx=canvas.getContext("2d")

ctx.filter=video.style.filter

ctx.translate(canvas.width,0)
ctx.scale(-1,1)

ctx.drawImage(video,0,0,canvas.width,canvas.height)

const data=canvas.toDataURL("image/png")

stripImgs[i].src=data

}

nextBtn.style.display="inline-block"

}

/* NEXT PAGE */

nextBtn.onclick=()=>{

document.getElementById("cameraPage").classList.remove("active")
document.getElementById("customizePage").classList.add("active")

document.getElementById("finalImages").innerHTML=
document.getElementById("stripImages").innerHTML

}

/* STRIP COLOR */

document.getElementById("stripColor").oninput=(e)=>{

document.querySelectorAll(".strip-preview").forEach(s=>{
s.style.background=e.target.value
})

}

/* DOWNLOAD + QR */

document.getElementById("downloadStrip").onclick=()=>{

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=1000
canvas.height=3200

ctx.fillStyle=document.getElementById("stripColor").value
ctx.fillRect(0,0,canvas.width,canvas.height)

const imgs=document.querySelectorAll("#finalImages img")

imgs.forEach((img,i)=>{
ctx.drawImage(img,80,150+(i*720),840,630)
})

ctx.fillStyle="#ffceda"
ctx.font="bold 35px Arial"
ctx.textAlign="center"
ctx.fillText("@aila4cuts",500,3100)

photostripData=canvas.toDataURL("image/png")

const link=document.createElement("a")
link.href=photostripData
link.download="aila4cuts_strip.png"
link.click()

/* QR WITH IMAGE */

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),{
text:photostripData,
width:120,
height:120
})

}

/* FULLSCREEN */

document.getElementById("fullscreenBtn").onclick=()=>{

if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
}else{
document.exitFullscreen()
}

}

</script>

</body>
</html>
