<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aila4cuts | Photo Booth</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --pica-red: #8B0000;
            --soft-pink: #ffceda;
            --deep-pink: #d17a8e;
            --white: #ffffff;
            /* Apple-inspired font stack */
            --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #fdf9f9;
            font-family: var(--apple-font);
            -webkit-font-smoothing: antialiased;
        }

        .container { text-align: center; width: 100%; max-width: 1200px; padding: 20px; }
        
        .brand-title {
            font-size: 42px;
            font-weight: 700;
            color: var(--deep-pink);
            letter-spacing: -1px;
            margin-bottom: 25px;
        }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Main Booth Layout */
        .booth-layout {
            display: flex;
            justify-content: center;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .video-box {
            position: relative;
            width: 720px;
            height: 540px;
            background: #000;
            border: 12px solid var(--white);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: filter 0.3s; }

        .countdown-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 180px;
            color: white;
            font-weight: 700;
            z-index: 10;
            display: none;
        }

        /* The Strip Preview */
        .strip-preview {
            position: relative;
            width: 250px;
            background: var(--pica-red);
            padding: 40px 15px 25px 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-strip { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .image-strip img { width: 100%; height: 165px; object-fit: cover; background: #222; }

        .watermark {
            margin-top: 15px;
            color: var(--soft-pink);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Controls Section */
        .main-controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .filter-group {
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label { font-weight: 600; color: #666; font-size: 14px; }

        select, input[type="color"], input[type="file"] {
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid #eee;
            font-family: var(--apple-font);
            outline: none;
        }

        button {
            padding: 14px 28px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: 0.3s;
            font-family: var(--apple-font);
        }

        .btn-capture { background: var(--deep-pink); color: white; padding: 18px 60px; font-size: 18px; }
        .btn-capture:hover { background: #b05e71; }
        .btn-next { background: #007aff; color: white; display: none; padding: 18px 50px; }
        .btn-dl { background: var(--soft-pink); color: var(--deep-pink); width: 100%; margin-top: 10px; }

        /* Customization Page Grid */
        .customize-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            text-align: left;
        }

        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .card h3 { margin-top: 0; font-weight: 600; color: #333; }

        #qrcode { margin-top: 15px; background: white; padding: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-title">aila4cuts</div>

    <div id="cameraPage" class="page active">
        <div class="booth-layout">
            <div class="video-box">
                <video id="video" autoplay playsinline></video>
                <div id="countdown" class="countdown-overlay">3</div>
            </div>
            
            <div class="strip-preview">
                <div class="image-strip" id="stripImages">
                    <img src=""><img src=""><img src=""><img src="">
                </div>
                <div class="watermark">@aila4cuts</div>
            </div>
        </div>

        <div class="main-controls">
            <div class="filter-group">
                <label>Filter:</label>
                <select id="mainFilter">
                    <option value="none">Original</option>
                    <option value="grayscale(1) contrast(1.2)">B&W</option>
                    <option value="brightness(1.2) contrast(1.1) saturate(1.2)">Bright</option>
                    <option value="sepia(0.6) contrast(1.1)">Sepia</option>
                    <option value="sepia(0.2) contrast(1.2) brightness(1.1) saturate(0.8)">Vintage</option>
                    <option value="brightness(1.15) saturate(1.1) contrast(0.9)">Soft Bright</option>
                </select>
            </div>
