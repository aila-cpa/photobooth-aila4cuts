<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aila4cuts - Pro Booth</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #fdf9f9;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container { text-align: center; max-width: 1100px; }
        h1 { font-weight: bold; margin-bottom: 20px; color: #ffceda; text-transform: uppercase; letter-spacing: 2px; }

        .header-controls {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }

        .header-controls input, .header-controls select {
            padding: 8px;
            border-radius: 8px;
            border: 2px solid #ffceda;
        }

        .layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 50px;
            flex-wrap: wrap;
        }

        /* Camera Section */
        .video-container {
            width: 500px;
            height: 375px; /* Standard 4:3 view for easier posing */
            border: 5px solid #ffceda;
            border-radius: 10px;
            overflow: hidden;
            background: black;
            position: relative;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* PHOTOSTRIP PREVIEW - Styled exactly like the upload */
        .strip-wrapper {
            position: relative;
            width: 180px; /* Slim profile */
            background: #8B0000; /* Matching the red background in your photo */
            padding: 35px 12px 60px 12px; /* Top, Left/Right, Bottom padding */
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .image-strip {
            display: flex;
            flex-direction: column;
            gap: 6px; /* TIGHT SPACING between photos */
        }

        .image-strip img {
            width: 100%;
            height: 120px; /* Vertical aspect ratio per frame */
            background: #444;
            object-fit: cover;
            display: block;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* Custom Overlay Layer */
        #layoutOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            object-fit: fill;
            z-index: 10;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            background: #ffceda;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            color: #d17a8e;
            transition: 0.3s;
        }

        button:hover { background: #ff9fb4; color: white; }

        .countdown {
            position: absolute;
            font-size: 100px;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 20;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>PHOTO BOOTH</h1>

    <div class="header-controls">
        <label>Overlay PNG:</label>
        <input type="file" id="layoutUpload" accept="image/png">
        
        <select id="filterSelect">
            <option value="none">Normal</option>
            <option value="brightness(1.2) contrast(1.1) saturate(1.3)">PicaPica (Bright)</option>
            <option value="grayscale(1)">B&W</option>
            <option value="brightness(1.1) contrast(1.2) sepia(0.2)">Vintage</option>
        </select>
        
        <label>Strip Color:</label>
        <input type="color" id="borderColor" value="#8B0000">
    </div>

    <div class="layout">
        <div class="camera-side">
            <div class="video-container">
                <video id="video" autoplay></video>
                <div id="countdown" class="countdown">3</div>
            </div>
            <div class="controls">
                <button id="start">📸 START SEQUENCE</button>
                <button id="reset">🔄 RESET</button>
            </div>
        </div>

        <div class="strip-wrapper" id="captureArea">
            <div class="image-strip" id="image-strip">
                <img src="" alt="">
                <img src="" alt="">
                <img src="" alt="">
                <img src="" alt="">
            </div>
            <img id="layoutOverlay" src="" style="display: none;">
        </div>
    </div>

    <div class="controls">
        <button id="download" style="background: #8B0000; color: white;">💾 DOWNLOAD PHOTOSTRIP</button>
    </div>

    <div id="qrcode"></div>
</div>

<script>
    const video = document.getElementById("video");
    const startButton = document.getElementById("start");
    const downloadButton = document.getElementById("download");
    const resetButton = document.getElementById("reset");
    const countdown = document.getElementById("countdown");
    const imageStrip = document.getElementById("image-strip").getElementsByTagName("img");
    const layoutOverlay = document.getElementById("layoutOverlay");
    const stripWrapper = document.getElementById("captureArea");
    const borderColorInput = document.getElementById("borderColor");

    let layoutImage = new Image();

    // Camera Init
    navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Camera blocked or not found."));

    // Filter Logic
    document.getElementById("filterSelect").addEventListener("change", (e) => {
        video.style.filter = e.target.value;
    });

    // Background Color Change
    borderColorInput.addEventListener("input", (e) => {
        stripWrapper.style.backgroundColor = e.target.value;
    });

    // Layout Upload & Overlay
    document.getElementById("layoutUpload").addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            layoutOverlay.src = event.target.result;
            layoutOverlay.style.display = "block";
            layoutImage.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    async function captureSequence() {
        for (let i = 0; i < 4; i++) {
            // Countdown
            countdown.style.display = "block";
            for(let c = 3; c > 0; c--) {
                countdown.innerText = c;
                await new Promise(r => setTimeout(r, 1000));
            }
            countdown.style.display = "none";

            // Capture
            const canvas = document.createElement("canvas");
            canvas.width = 600;
            canvas.height = 450; 
            const ctx = canvas.getContext("2d");
            
            ctx.filter = video.style.filter || "none";
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            imageStrip[i].src = canvas.toDataURL("image/png");
        }
    }

    startButton.addEventListener("click", captureSequence);

    downloadButton.addEventListener("click", () => {
        if (!imageStrip[0].src) return alert("Take photos first!");

        const finalCanvas = document.createElement("canvas");
        const ctx = finalCanvas.getContext("2d");

        // High Res Dimensions for Printing
        const sw = 800;  
        const sh = 2400; 
        finalCanvas.width = sw;
        finalCanvas.height = sh;

        // 1. Background
        ctx.fillStyle = borderColorInput.value;
        ctx.fillRect(0, 0, sw, sh);

        // 2. Photos with Tight Spacing
        const imgW = 720; // Leave small margin on sides
        const imgH = 500;
        const xPos = (sw - imgW) / 2;
        const startY = 120; // Top margin
        const gap = 20;    // Tight gap

        for (let i = 0; i < 4; i++) {
            ctx.drawImage(imageStrip[i], xPos, startY + (i * (imgH + gap)), imgW, imgH);
        }

        // 3. Overlay Layout
        if (layoutImage.src) {
            ctx.drawImage(layoutImage, 0, 0, sw, sh);
        }

        // 4. Download
        const link = document.createElement("a");
        link.download = "Picapica_Strip.png";
        link.href = finalCanvas.toDataURL("image/png", 1.0);
        link.click();
    });

    resetButton.addEventListener("click", () => {
        for (let img of imageStrip) img.src = "";
    });
</script>

</body>
</html>
